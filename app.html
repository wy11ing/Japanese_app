<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N2学習">
<meta name="theme-color" content="#1A1A2E">
<title>JLPT N2 学習 App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#E8395A;--red-d:#B02040;
  --ink:#1A1A2E;--ink2:#252540;
  --purple:#5B6BF5;
  --amber:#F5A623;--green:#27AE60;
  --cream:#FFF9F4;
  --muted:#8888AA;--border:rgba(0,0,0,0.07);
  --shadow:0 2px 16px rgba(0,0,0,0.07);
}
html,body{height:100%;overflow:hidden;background:#1A1A2E;font-family:'Noto Sans JP',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;background:var(--cream);max-width:430px;margin:0 auto;position:relative;overflow:hidden;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--cream);overflow:hidden;}
.screen.hidden{display:none;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:90px;}
.scroll-area::-webkit-scrollbar{display:none;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;padding-top:max(env(safe-area-inset-top,14px),14px);background:var(--cream);border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{background:none;border:none;font-size:17px;font-weight:700;color:var(--red);cursor:pointer;padding:4px 2px;min-width:56px;}
.top-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:16px;font-weight:700;color:var(--ink);}
.badge-sm{font-size:12px;color:var(--muted);min-width:56px;text-align:right;}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:#fff;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom,0px),0px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:10px;font-weight:500;}
.nav-item.active{color:var(--red);}
.nav-icon{font-size:22px;line-height:1;}

/* HOME */
.home-header{background:linear-gradient(150deg,#1A1A2E 0%,#2A1060 100%);padding:24px 20px 30px;flex-shrink:0;position:relative;overflow:hidden;}
.home-header::after{content:'N2';position:absolute;right:-8px;bottom:-22px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:130px;font-weight:900;color:rgba(255,255,255,0.04);line-height:1;pointer-events:none;}
.badge-chip{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 14px;border-radius:99px;margin-bottom:12px;}
.home-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:40px;font-weight:900;color:#fff;line-height:1;letter-spacing:-1px;}
.home-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;}
.stats-row{display:flex;gap:10px;padding:14px 16px 8px;}
.stat-card{flex:1;background:#fff;border-radius:18px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:var(--shadow);}
.stat-n{font-family:'Zen Kaku Gothic New',sans-serif;font-size:24px;font-weight:900;color:var(--red);}
.stat-l{font-size:10px;color:var(--muted);}
.section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;padding:8px 16px 4px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 12px;}
.menu-card{background:#fff;border:none;border-radius:20px;padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:flex-start;box-shadow:var(--shadow);text-align:left;width:100%;transition:transform 0.12s;}
.menu-card:active{transform:scale(0.96);}
.menu-card.mv{border-top:4px solid var(--red);}
.menu-card.mg{border-top:4px solid var(--purple);}
.menu-card.mq{border-top:4px solid var(--amber);}
.menu-card.mw{border-top:4px solid var(--green);}
.menu-em{font-size:26px;margin-bottom:2px;}
.menu-t{font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;color:var(--ink);}
.menu-d{font-size:11px;color:var(--muted);}
.menu-b{font-size:10px;font-weight:700;background:rgba(0,0,0,0.05);border-radius:99px;padding:2px 10px;color:var(--muted);margin-top:2px;display:inline-block;}
.hint-box{margin:4px 16px 16px;background:rgba(232,57,90,0.07);border-radius:14px;padding:12px 16px;font-size:12px;color:#8B1A3A;font-weight:500;}

/* PROF LEGEND */
.prof-legend{display:flex;gap:8px;padding:0 16px 12px;flex-wrap:wrap;}
.pl-item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;}
.pl-dot{width:8px;height:8px;border-radius:50%;}

/* PROGRESS BAR */
.prog-track{height:3px;background:rgba(0,0,0,0.06);margin:0 16px 14px;border-radius:99px;flex-shrink:0;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.4s;}
.prog-red{background:var(--red);}
.prog-purple{background:var(--purple);}

/* FLASHCARD */
.fc-wrap{margin:0 16px 12px;height:230px;perspective:1000px;cursor:pointer;flex-shrink:0;}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s ease;}
.fc.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;backface-visibility:hidden;padding:20px;text-align:center;}
.fc-front{background:linear-gradient(145deg,#1A1A2E,#252540);box-shadow:0 10px 36px rgba(26,26,46,0.3);}
.fc-back{background:linear-gradient(145deg,#8B1A3A,#B02040);transform:rotateY(180deg);box-shadow:0 10px 36px rgba(176,32,64,0.35);}
.fc-type-tag{font-size:10px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.65);padding:2px 10px;border-radius:99px;}
.fc-kanji{font-family:'Zen Kaku Gothic New',sans-serif;font-size:56px;font-weight:900;color:#fff;line-height:1;}
.fc-reading{font-size:16px;color:rgba(255,255,255,0.55);}
.fc-meaning{font-size:22px;font-weight:700;color:#fff;}
.fc-hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px;letter-spacing:1px;}

/* PROFICIENCY SELECTOR */
.prof-sel{display:flex;gap:8px;padding:0 16px 12px;flex-shrink:0;}
.ps-btn{flex:1;padding:10px 4px;border:none;border-radius:14px;cursor:pointer;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform 0.1s;}
.ps-btn:active{transform:scale(0.93);}
.ps-m{background:rgba(39,174,96,0.12);color:#1a8a4a;}
.ps-f{background:rgba(91,107,245,0.12);color:#3a4bd4;}
.ps-o{background:rgba(245,166,35,0.12);color:#b07800;}
.ps-u{background:rgba(232,57,90,0.1);color:var(--red);}
.ps-icon{font-size:16px;}
.prof-current-label{text-align:center;font-size:12px;font-weight:600;padding:0 16px 8px;flex-shrink:0;}

/* EXAMPLES */
.ex-area{padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.ex-card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);}
.ex-num{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:1px;}
.ex-jp{font-size:14px;color:var(--ink);line-height:1.65;margin-bottom:3px;}
.ex-zh{font-size:12px;color:var(--muted);}

/* NAV ROW */
.nav-row{display:flex;align-items:center;gap:10px;padding:0 16px 12px;flex-shrink:0;}
.nav-btn{flex:1;padding:14px;border:none;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;}
.nav-btn:active{opacity:0.75;}
.nav-prev{background:#EAEAF5;color:var(--ink2);}
.nav-next{background:var(--red);color:#fff;}
.nav-purple{background:var(--purple);color:#fff;}
.seen-pill{background:rgba(0,0,0,0.06);border-radius:99px;padding:6px 10px;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}

/* LIST SCREENS */
.search-wrap{padding:10px 16px 6px;}
.search-input{width:100%;padding:11px 16px;background:#fff;border:1.5px solid var(--border);border-radius:14px;font-size:14px;color:var(--ink);outline:none;font-family:'Noto Sans JP',sans-serif;}
.search-input:focus{border-color:var(--purple);}
.filter-row{display:flex;gap:6px;padding:6px 16px 8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:99px;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:rgba(0,0,0,0.06);color:var(--muted);}
.filter-chip.fc-active{background:var(--red);color:#fff;}
.filter-chip.fc-purple{background:var(--purple);color:#fff;}

.vocab-item{display:flex;align-items:center;gap:10px;background:#fff;border:none;padding:13px 16px;cursor:pointer;text-align:left;width:100%;border-bottom:1px solid var(--border);}
.vocab-item:active{background:#f8f5ff;}
.vi-left{display:flex;flex-direction:column;gap:2px;min-width:72px;}
.vi-word{font-family:'Zen Kaku Gothic New',sans-serif;font-size:17px;font-weight:700;color:var(--ink);}
.vi-read{font-size:11px;color:var(--muted);}
.vi-mean{font-size:13px;color:var(--ink2);flex:1;line-height:1.4;}
.prof-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pd-mastered{background:#27AE60;}
.pd-familiar{background:var(--purple);}
.pd-ok{background:var(--amber);}
.pd-unknown{background:var(--red);}
.pd-none{background:#ddd;}

.g-item{display:flex;align-items:center;background:#fff;border:none;padding:14px 16px;cursor:pointer;text-align:left;width:100%;border-bottom:1px solid var(--border);}
.g-item:active{background:#f8f5ff;}
.gi-left{flex:1;}
.gi-pattern{font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;color:var(--purple);}
.gi-meaning{font-size:12px;color:var(--muted);margin-top:2px;}
.gi-arrow{font-size:20px;color:#ccc;margin-left:8px;}

/* GRAMMAR DETAIL */
.gd-wrap{padding:16px;display:flex;flex-direction:column;gap:12px;}
.gd-pattern{font-family:'Zen Kaku Gothic New',sans-serif;font-size:26px;font-weight:900;color:var(--purple);}
.gd-badge{display:inline-block;background:rgba(91,107,245,0.1);color:var(--purple);font-size:13px;font-weight:600;padding:4px 14px;border-radius:99px;}
.gd-card{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);}
.gd-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:7px;}
.gd-body{font-size:14px;color:var(--ink2);line-height:1.8;}
.gd-struct{font-size:13px;color:var(--ink);background:#f0eeff;padding:8px 12px;border-radius:10px;font-weight:500;}
.gd-similar{font-size:13px;color:var(--purple);font-weight:600;}

/* QUIZ */
.qz-card{margin:0 16px 14px;border-radius:22px;padding:22px 18px;text-align:center;}
.qz-vocab{background:linear-gradient(145deg,#1A1A2E,#252540);box-shadow:0 8px 32px rgba(26,26,46,0.28);}
.qz-gram{background:linear-gradient(145deg,#1E0060,#4040C0);box-shadow:0 8px 32px rgba(64,64,192,0.28);}
.qz-word{font-family:'Zen Kaku Gothic New',sans-serif;font-size:46px;font-weight:900;color:#fff;line-height:1;}
.qz-read{font-size:16px;color:rgba(255,255,255,0.5);margin-top:5px;}
.qz-ask{font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px;letter-spacing:1px;}
.qz-gram-meaning{font-size:19px;font-weight:700;color:#fff;margin-bottom:10px;}
.qz-ex{text-align:left;background:rgba(255,255,255,0.07);border-radius:10px;padding:9px 12px;margin-bottom:6px;}
.qz-ex-jp{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.6;}
.qz-ex-zh{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;}

.opts{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.opt-btn{width:100%;padding:13px 16px;background:#fff;border:2px solid transparent;border-radius:14px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.opt-btn.sm{font-size:13px;}
.opt-btn.correct{background:rgba(39,174,96,0.08);border-color:#27AE60;color:#1a7a40;font-weight:700;}
.opt-btn.wrong{background:rgba(232,57,90,0.07);border-color:var(--red);color:var(--red);}
.opt-btn.dim{opacity:0.32;}

.go-btn{display:block;width:calc(100% - 32px);margin:12px 16px 0;padding:15px;background:var(--red);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;}
.go-btn:active{opacity:0.85;}

.reveal-card{margin:12px 16px 0;background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);}
.rv-ok{font-size:11px;font-weight:700;color:#27AE60;margin-bottom:6px;}
.rv-wrong{font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px;}
.rv-pattern{font-family:'Zen Kaku Gothic New',sans-serif;font-size:19px;font-weight:900;color:var(--purple);margin-bottom:5px;}
.rv-body{font-size:13px;color:var(--ink2);line-height:1.7;}
.rv-drop{font-size:11px;color:var(--red);font-weight:600;margin-top:5px;}

/* RESULT */
.result-body{display:flex;flex-direction:column;align-items:center;padding:40px 24px;gap:18px;}
.result-ring{width:148px;height:148px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.ring-inner{position:absolute;inset:14px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.ring-pct{font-family:'Zen Kaku Gothic New',sans-serif;font-size:30px;font-weight:900;color:var(--red);}
.result-score{font-family:'Zen Kaku Gothic New',sans-serif;font-size:22px;font-weight:700;color:var(--ink);}
.result-msg{font-size:15px;color:var(--ink2);font-weight:500;text-align:center;}
.retry-btn{padding:15px 44px;background:var(--red);color:#fff;border:none;border-radius:99px;font-size:15px;font-weight:700;cursor:pointer;}
.home-link{background:none;border:none;font-size:14px;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:-4px;}

/* WEAK REVIEW */
.weak-banner{margin:12px 16px;background:linear-gradient(135deg,#8B1A3A,var(--red));border-radius:16px;padding:14px 16px;color:#fff;}
.wb-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px;}
.wb-sub{font-size:12px;color:rgba(255,255,255,0.7);}
.weak-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.weak-item{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;border:none;cursor:pointer;text-align:left;width:100%;}
.wi-word{font-family:'Zen Kaku Gothic New',sans-serif;font-size:16px;font-weight:700;color:var(--ink);}
.wi-info{flex:1;}
.wi-mean{font-size:12px;color:var(--muted);}

/* EMPTY */
.empty{text-align:center;padding:50px 24px;color:var(--muted);}
.empty-em{font-size:48px;margin-bottom:10px;}
.empty-t{font-size:15px;font-weight:600;}
.empty-d{font-size:13px;margin-top:5px;}
</style>
</head>
<body>
<div id="app">
  <!-- HOME -->
  <div class="screen" id="scr-home">
    <div class="scroll-area">
      <div class="home-header">
        <div class="badge-chip">JLPT N2</div>
        <h1 class="home-title">N2 学習</h1>
        <p class="home-sub">日本語能力試験 N2 完整學習 App</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-n" id="stat-mastered">0</span><span class="stat-l">🟢 非常熟悉</span></div>
        <div class="stat-card"><span class="stat-n" id="stat-familiar">0</span><span class="stat-l">🔵 熟悉</span></div>
        <div class="stat-card"><span class="stat-n" id="stat-unknown">0</span><span class="stat-l">🔴 不熟</span></div>
      </div>
      <div class="section-label">單字・文法</div>
      <div class="menu-grid">
        <button class="menu-card mv" onclick="showVocabCard()">
          <div class="menu-em">🃏</div>
          <span class="menu-t">単語カード</span>
          <span class="menu-d">翻轉記憶卡片</span>
          <span class="menu-b" id="mb-vocab">60語</span>
        </button>
        <button class="menu-card mg" onclick="showGrammarList()">
          <div class="menu-em">📖</div>
          <span class="menu-t">文法一覧</span>
          <span class="menu-d">文法複習清單</span>
          <span class="menu-b">30項</span>
        </button>
        <button class="menu-card mv" onclick="showVocabList()">
          <div class="menu-em">📋</div>
          <span class="menu-t">単語一覧</span>
          <span class="menu-d">依熟練度篩選</span>
          <span class="menu-b">全60語</span>
        </button>
        <button class="menu-card mw" onclick="showWeakReview()">
          <div class="menu-em">💪</div>
          <span class="menu-t">弱点復習</span>
          <span class="menu-d">集中攻克不熟單字</span>
          <span class="menu-b" id="mb-weak">0語</span>
        </button>
      </div>
      <div class="section-label">測驗</div>
      <div class="menu-grid">
        <button class="menu-card mq" onclick="showVocabQuiz()">
          <div class="menu-em">⚡</div>
          <span class="menu-t">単語クイズ</span>
          <span class="menu-d">四選一測驗</span>
          <span class="menu-b">答錯降等級</span>
        </button>
        <button class="menu-card mg" onclick="showGrammarQuiz()">
          <div class="menu-em">🎯</div>
          <span class="menu-t">文法テスト</span>
          <span class="menu-d">含例句說明</span>
          <span class="menu-b">答錯降等級</span>
        </button>
      </div>
      <div class="hint-box">💡 每次練習後選擇熟練度，App 會記住你的進度！答錯測驗會自動降低等級。</div>
      <div class="section-label">熟練度說明</div>
      <div class="prof-legend" style="padding:0 16px 20px;">
        <div class="pl-item"><div class="pl-dot" style="background:#27AE60"></div><span style="color:#1a7a40">非常熟悉</span></div>
        <div class="pl-item"><div class="pl-dot" style="background:#5B6BF5"></div><span style="color:#3a4bd4">熟悉</span></div>
        <div class="pl-item"><div class="pl-dot" style="background:#F5A623"></div><span style="color:#b07800">還行</span></div>
        <div class="pl-item"><div class="pl-dot" style="background:#E8395A"></div><span style="color:#E8395A">不熟</span></div>
        <div class="pl-item"><div class="pl-dot" style="background:#ddd"></div><span style="color:#999">未學習</span></div>
      </div>
    </div>
  </div>

  <!-- VOCAB CARD -->
  <div class="screen hidden" id="scr-vocab-card">
    <div class="top-bar">
      <button class="back-btn" onclick="goHome()">‹ 戻る</button>
      <span class="top-title">単語カード</span>
      <span class="badge-sm" id="vc-count">1/60</span>
    </div>
    <div class="prog-track"><div class="prog-fill prog-red" id="vc-prog" style="width:0%"></div></div>
    <div class="fc-wrap" onclick="flipCard()" id="vc-wrap">
      <div class="fc" id="fc">
        <div class="fc-face fc-front">
          <div class="fc-type-tag" id="fc-type"></div>
          <div class="fc-kanji" id="fc-kanji"></div>
          <div class="fc-reading" id="fc-reading"></div>
          <div class="fc-hint">タップして意味を確認 👆</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-meaning" id="fc-meaning"></div>
        </div>
      </div>
    </div>
    <div class="prof-current-label" id="vc-prof-label"></div>
    <div class="prof-sel">

// STATE
// ═══════════════════════════════════════════
let proficiency = {}; // id -> 'mastered'|'familiar'|'ok'|'unknown'
let grammarProf = {};
let vcIdx = 0;
let vcFlipped = false;

const PROF_LEVELS = ['mastered','familiar','ok','unknown'];
const PROF_LABELS = {mastered:'🟢 非常熟悉',familiar:'🔵 熟悉',ok:'🟡 還行',unknown:'🔴 不熟',none:'⚪ 未學習'};
const PROF_COLORS = {mastered:'#27AE60',familiar:'#5B6BF5',ok:'#F5A623',unknown:'#E8395A',none:'#ddd'};

function loadState(){
  try{
    const p = localStorage.getItem('n2prof'); if(p) proficiency=JSON.parse(p);
    const g = localStorage.getItem('n2gprof'); if(g) grammarProf=JSON.parse(g);
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem('n2prof',JSON.stringify(proficiency));
    localStorage.setItem('n2gprof',JSON.stringify(grammarProf));
  }catch(e){}
}
function dropLevel(id, isGrammar){
  const store = isGrammar ? grammarProf : proficiency;
  const cur = store[id] || 'none';
  const idx = PROF_LEVELS.indexOf(cur);
  if(idx === -1) store[id] = 'unknown';
  else if(idx < PROF_LEVELS.length-1) store[id] = PROF_LEVELS[idx+1];
  // already at 'unknown', stay
  saveState(); updateHomeStats();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function goHome(){ showScreen('scr-home'); updateHomeStats(); }

function updateHomeStats(){
  let m=0,f=0,o=0,u=0,weak=0;
  VOCAB.forEach(v=>{
    const p=proficiency[v.id]||'none';
    if(p==='mastered')m++;
    else if(p==='familiar')f++;
    else if(p==='ok')o++;
    else if(p==='unknown'){u++;weak++;}
  });
  document.getElementById('stat-mastered').textContent=m;
  document.getElementById('stat-familiar').textContent=f;
  document.getElementById('stat-unknown').textContent=u;
  document.getElementById('mb-weak').textContent=weak+'語';
}

}

  }
  document.getElementById('weak-body').innerHTML=html;
}

// VOCAB QUIZ
// ═══════════════════════════════════════════
let vqQuestions=[], vqIdx=0, vqScore=0, vqChosen=null;
function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}
function genOpts(correct, pool, key){
  const others=shuffle(pool.filter(x=>x[key]!==correct[key])).slice(0,3);
  return shuffle([correct,...others]).map(x=>x[key]);
}
function showVocabQuiz(){
  showScreen('scr-vocab-quiz');
  vqQuestions=shuffle(VOCAB).slice(0,15);
  vqIdx=0; vqScore=0; vqChosen=null;
  renderVQ();
}
function renderVQ(){
  const q=vqQuestions[vqIdx];
  const total=vqQuestions.length;
  document.getElementById('vq-count').textContent=(vqIdx+1)+'/'+total;
  document.getElementById('vq-prog').style.width=((vqIdx/total)*100)+'%';
  const opts=genOpts(q,VOCAB,'meaning');
  document.getElementById('vq-body').innerHTML=`
    <div class="qz-card qz-vocab">
      <div class="qz-word">${q.word}</div>
      <div class="qz-read">${q.reading}</div>
      <div class="qz-ask">この単語の意味は？</div>
    </div>
    <div class="opts">${opts.map(o=>`<button class="opt-btn" onclick="pickVQ(this,'${o.replace(/'/g,"\\'")}','${q.meaning.replace(/'/g,"\\'")}',${q.id})">${o}</button>`).join('')}</div>
    <div id="vq-next"></div>`;
}
function pickVQ(btn,chosen,correct,id){
  if(vqChosen)return;
  vqChosen=chosen;
  const isCorrect=chosen===correct;
  if(isCorrect) vqScore++;
  else dropLevel(id,false);
  document.querySelectorAll('#vq-body .opt-btn').forEach(b=>{
    const t=b.textContent;
    if(t===correct)b.className='opt-btn correct';
    else if(t===chosen)b.className='opt-btn wrong';
    else b.className='opt-btn dim';
  });
  const total=vqQuestions.length;
  document.getElementById('vq-next').innerHTML=`
    ${!isCorrect?`<div style="margin:10px 16px 0;padding:10px 14px;background:rgba(232,57,90,0.08);border-radius:12px;font-size:12px;color:var(--red);font-weight:600;">❌ 答錯了！熟練度已下降一個等級</div>`:''}
    <button class="go-btn" onclick="nextVQ()">${vqIdx+1>=total?'結果を見る 🎉':'次の問題 ▶'}</button>`;
}
function nextVQ(){
  vqChosen=null;
  if(vqIdx+1>=vqQuestions.length){ showVQResult(); return; }
  vqIdx++; renderVQ();
}
function showVQResult(){
  showResult('単語クイズ',vqScore,vqQuestions.length,'showVocabQuiz');
}

// ═══════════════════════════════════════════
// GRAMMAR QUIZ
// ═══════════════════════════════════════════
let gqQuestions=[], gqIdx=0, gqScore=0, gqChosen=null;
function showGrammarQuiz(){
  showScreen('scr-grammar-quiz');
  gqQuestions=shuffle(GRAMMAR).slice(0,10);
  gqIdx=0; gqScore=0; gqChosen=null;
  renderGQ();
}
function renderGQ(){
  const q=gqQuestions[gqIdx];
  const total=gqQuestions.length;
  document.getElementById('gq-count').textContent=(gqIdx+1)+'/'+total;
  document.getElementById('gq-prog').style.width=((gqIdx/total)*100)+'%';
  const opts=genOpts(q,GRAMMAR,'pattern');
  const ex = q.examples.slice(0,2);
  document.getElementById('gq-body').innerHTML=`
    <div class="qz-card qz-gram">
      <div class="qz-gram-meaning">${q.meaning}</div>
      <div class="qz-ask" style="margin-bottom:10px;">意味に合う文法パターンは？</div>
      ${ex.map(e=>`<div class="qz-ex"><div class="qz-ex-jp">${e.jp}</div><div class="qz-ex-zh">${e.zh}</div></div>`).join('')}
    </div>
    <div class="opts">${opts.map(o=>`<button class="opt-btn sm" onclick="pickGQ(this,'${o.replace(/'/g,"\\'")}','${q.pattern.replace(/'/g,"\\'")}',${q.id})">${o}</button>`).join('')}</div>
    <div id="gq-reveal"></div>`;
}
function pickGQ(btn,chosen,correct,id){
  if(gqChosen)return;
  gqChosen=chosen;
  const isCorrect=chosen===correct;
  if(isCorrect) gqScore++;
  else dropLevel(id,true);
  const g=GRAMMAR.find(x=>x.id===id);
  document.querySelectorAll('#gq-body .opt-btn').forEach(b=>{
    const t=b.textContent;
    if(t===correct)b.className='opt-btn sm correct';
    else if(t===chosen)b.className='opt-btn sm wrong';
    else b.className='opt-btn sm dim';
  });
  const total=gqQuestions.length;
  document.getElementById('gq-reveal').innerHTML=`
    <div class="reveal-card">
      <div class="${isCorrect?'rv-ok':'rv-wrong'}">${isCorrect?'✅ 正解！':'❌ 不正解'}</div>
      <div class="rv-pattern">${g.pattern}</div>
      <div class="rv-body">${g.explanation}</div>
      ${!isCorrect?`<div class="rv-drop">熟練度が一段階下がりました</div>`:''}
    </div>
    <button class="go-btn" onclick="nextGQ()">${gqIdx+1>=total?'結果を見る 🎉':'次へ ▶'}</button>`;
}
function nextGQ(){
  gqChosen=null;
  if(gqIdx+1>=gqQuestions.length){ showGQResult(); return; }
  gqIdx++; renderGQ();
}
function showGQResult(){
  showResult('文法テスト',gqScore,gqQuestions.length,'showGrammarQuiz');
}

// ═══════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════
function showResult(title,score,total,retryFn){
  showScreen('scr-result');
  document.getElementById('result-title').textContent=title+'結果';
  const pct=Math.round((score/total)*100);
  const deg=pct*3.6;
  const msg=pct>=80?'🎉 素晴らしい！N2合格ライン！':pct>=60?'👍 もう少し！諦めないで！':'💪 復習が必要！弱点を確認しよう！';
  document.getElementById('result-body').innerHTML=`
    <div class="result-ring">
      <svg width="148" height="148" style="position:absolute;inset:0;transform:rotate(-90deg);">
        <circle cx="74" cy="74" r="60" fill="none" stroke="#eee" stroke-width="14"/>
        <circle cx="74" cy="74" r="60" fill="none" stroke="var(--red)" stroke-width="14"
          stroke-dasharray="${2*Math.PI*60}" stroke-dashoffset="${2*Math.PI*60*(1-pct/100)}" stroke-linecap="round"/>
      </svg>
      <div class="ring-inner"><div class="ring-pct">${pct}%</div></div>
    </div>
    <div class="result-score">${score} / ${total} 正解</div>
    <div class="result-msg">${msg}</div>
    <button class="retry-btn" onclick="${retryFn}()">もう一度挑戦</button>
    <button class="home-link" onclick="goHome()">ホームへ戻る</button>`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();
updateHomeStats();
</script>
